<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Arena - Fix</title>
    <style>
        body { background: #000; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; }
        .ad-container { margin: 10px; border: 1px solid #333; }
        .go-btn { padding: 20px 50px; background: red; border: none; color: white; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="landing">
        <button class="go-btn" onclick="start()">GO</button>
    </div>

    <div id="main" style="display:none;">
        <!-- Container 1 -->
        <div id="container-1" class="ad-container"></div>
        <!-- Container 2 -->
        <div id="container-2" class="ad-container"></div>
        <!-- Container 3 -->
        <div id="container-3" class="ad-container"></div>
    </div>

    <script>
        function start() {
            document.getElementById('landing').style.display = 'none';
            document.getElementById('main').style.display = 'flex';
            loadAds();
        }

        function loadAds() {
            // Box 1
            renderAd('container-1', '0cde4171f900d3dfac901dced582f0b5', 250, 300);
            // Box 2
            renderAd('container-2', 'c3b2b9ff0e0ccb8245a157019542f183', 50, 320);
            // Box 3
            renderAd('container-3', '5c86a4e54aea03bcb8d4ee823c81e69a', 60, 468);
        }

        function renderAd(containerId, key, h, w) {
            const container = document.getElementById(containerId);
            // Iframe তৈরি করছি যাতে অ্যাডগুলো একে অপরের সাথে কনফ্লিক্ট না করে
            const iframe = document.createElement('iframe');
            iframe.width = w + 20;
            iframe.height = h + 20;
            iframe.frameBorder = "0";
            iframe.scrolling = "no";
            
            // Iframe এর ভেতর HTML তৈরি করা
            const html = `
                <html>
                <body style="margin:0; padding:0;">
                    <script type="text/javascript">
                        atOptions = { 'key' : '${key}', 'format' : 'iframe', 'height' : ${h}, 'width' : ${w}, 'params' : {} };
                    <\/script>
                    <script type="text/javascript" src="https://www.highperformanceformat.com/${key}/invoke.js"><\/script>
                </body>
                </html>
            `;
            
            iframe.srcdoc = html;
            container.appendChild(iframe);
        }
    </script>
</body>
</html>
