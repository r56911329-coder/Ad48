<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Stream Pro</title>
    <style>
        body { background-color: #0b111e; color: #fff; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 20px; font-family: sans-serif; }
        .ad-box { width: 320px; height: 320px; background: #141f32; border: 1px solid #1e2d4a; border-radius: 8px; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ad-content { width: 100%; height: 250px; display: flex; align-items: center; justify-content: center; }
        .progress-bar { width: 100%; height: 5px; background: #1e2d4a; position: absolute; bottom: 0; }
        .progress-fill { height: 100%; background: #00b0ff; width: 0%; transition: width 0.3s linear; }
    </style>
</head>
<body>

    <!-- ৬টি বক্স -->
    <div class="ad-box" id="box-1"></div>
    <div class="ad-box" id="box-2"></div>
    <div class="ad-box" id="box-3"></div>
    <div class="ad-box" id="box-4"></div>
    <div class="ad-box" id="box-5"></div>
    <div class="ad-box" id="box-6"></div>

    <script>
        // আপনার স্ক্রিপ্টগুলোর ফাংশন
        function loadAd(containerId, type) {
            const container = document.getElementById(containerId);
            container.innerHTML = '<div class="ad-content" id="inner-' + containerId + '"></div><div class="progress-bar"><div class="progress-fill" id="fill-' + containerId + '"></div></div>';
            
            const innerDiv = document.getElementById('inner-' + containerId);
            const fill = document.getElementById('fill-' + containerId);

            // অ্যাড লোড করার লজিক
            if (type === 'banner') {
                // ১ম স্ক্রিপ্ট
                let s1 = document.createElement('script');
                s1.src = "https://pl30405085.effectivecpmnetwork.com/0c11d435e5064692b9eaf585704e6833/invoke.js";
                innerDiv.appendChild(s1);
            } else if (type === 'link') {
                // ২য় স্ক্রিপ্ট (Link)
                innerDiv.innerHTML = '<a href="https://www.effectivecpmnetwork.com/jyuwyn3e?key=25a1cfb97914460efd5c182e7e7b3a76" target="_blank">Click Here</a>';
            } else if (type === 'js') {
                // ৩য় স্ক্রিপ্ট
                let s3 = document.createElement('script');
                s3.src = "https://pl30405087.effectivecpmnetwork.com/09/18/67/0918678a3a63fe6aef44482bf6c88b76.js";
                innerDiv.appendChild(s3);
            }

            // প্রোগ্রেস বার লুপ (৩০ সেকেন্ড)
            let width = 0;
            let interval = setInterval(() => {
                width += 1;
                fill.style.width = width + "%";
                if (width >= 100) {
                    clearInterval(interval);
                    loadAd(containerId, type); // রিফ্রেশ
                }
            }, 300); // ১০০ = ১০ সেকেন্ড, ৩০০ = ৩০ সেকেন্ড
        }

        // সব বক্স একসাথে শুরু করা
        window.onload = function() {
            loadAd('box-1', 'banner');
            loadAd('box-2', 'link');
            loadAd('box-3', 'js');
            loadAd('box-4', 'banner');
            loadAd('box-5', 'link');
            loadAd('box-6', 'js');
        };
    </script>
</body>
</html>
