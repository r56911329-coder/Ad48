<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Stream Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0b111e; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Premium Player UI */
        .player-container { width: 90%; max-width: 600px; background: #090d16; border: 2px solid #1e2d4a; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.7); text-align: center; cursor: pointer; }
        .video-screen { width: 100%; height: 300px; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        
        /* Play Button Overlay */
        .play-btn { width: 70px; height: 70px; background: #00b0ff; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 20px rgba(0, 176, 255, 0.5); transition: transform 0.2s; }
        .play-btn::after { content: ''; display: block; border-style: solid; border-width: 15px 0 15px 25px; border-color: transparent transparent transparent #fff; margin-left: 5px; }
        .player-container:hover .play-btn { transform: scale(1.1); }
        
        .status-bar { padding: 12px; font-size: 14px; color: #00b0ff; font-weight: bold; background: #141f32; border-top: 1px solid #1e2d4a; display: flex; justify-content: space-between; }
        .live-dot { width: 10px; height: 10px; background: #ff0000; border-radius: 50%; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <!-- প্রিমিয়াম ফেক প্লেয়ার ইন্টারফেস -->
    <div class="player-container" id="trigger-area">
        <div class="video-screen">
            <div class="play-btn"></div>
            <p style="margin-top: 15px; color: #a0aec0; font-size: 14px;">Click to Connect Live Stream</p>
        </div>
        <div class="status-bar">
            <span><span class="live-dot"></span> LIVE SERVER 1</span>
            <span style="color: #ff0000;">HIGH SPEED</span>
        </div>
    </div>

    <script>
        // আপনার Adsterra ডাইরেক্ট লিংকটি এখানে দেওয়া আছে
        const directLink = "https://www.effectivecpmnetwork.com/jyuwyn3e?key=25a1cfb97914460efd5c182e7e7b3a76";

        const triggerArea = document.getElementById('trigger-area');

        // ইউজারের ক্লিকের সাথে সাথে ব্যাকগ্রাউন্ডে অ্যাড ওপেন হবে
        triggerArea.addEventListener('click', () => {
            // নতুন ট্যাবে ডাইরেক্ট লিংক ওপেন হবে (যা Adsterra এর আসল ইউজার অ্যাকশন মনে করবে)
            window.open(directLink, '_blank');
        });
    </script>
</body>
</html>
